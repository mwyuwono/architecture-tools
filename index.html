<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Architecture Tools</title>

  <!-- M3 Design System -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/wyyew/m3-design-v2@main/src/styles/tokens.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/wyyew/m3-design-v2@main/src/styles/main.css">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: var(--font-sans);
      background-color: var(--md-sys-color-background);
      color: var(--md-sys-color-on-surface);
      margin: 0;
      padding: var(--spacing-xl);
    }

    h1 {
      font-family: var(--font-serif);
      font-weight: 500;
      color: var(--md-sys-color-primary);
      margin-bottom: var(--spacing-lg);
    }

    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: var(--spacing-lg);
      margin-top: var(--spacing-xl);
    }

    .tool-card {
      background: var(--md-sys-color-surface);
      border-radius: var(--md-sys-shape-corner-medium);
      padding: var(--spacing-lg);
    }

    .tool-card h2 {
      font-family: var(--font-serif);
      font-size: 1.25rem;
      margin: 0 0 var(--spacing-sm) 0;
    }

    .tool-card p {
      color: var(--md-sys-color-on-surface-variant);
      margin: 0 0 var(--spacing-md) 0;
    }

    .tool-category {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--md-sys-color-primary);
      margin-bottom: var(--spacing-xs);
      display: block;
    }

    .tool-link {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-xs);
      color: var(--md-sys-color-primary);
      text-decoration: none;
      font-weight: 500;
      margin-top: auto;
    }

    .tool-link:hover {
      text-decoration: underline;
    }

    .tool-card {
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <h1>Architecture Tools</h1>
  <p>A collection of vibe-coded tools for architectural practice.</p>

  <div class="tools-grid">
    <!-- Stair Calculator -->
    <div class="tool-card">
      <span class="tool-category">Calculators</span>
      <h2>Stair Calculator</h2>
      <p>Calculate residential stair dimensions based on IRC code. Enter floor-to-floor height to get riser count, tread depth, and total run.</p>
      <a href="stairs.html" class="tool-link">Open Tool →</a>
    </div>

    <!-- Add new tools here following the same pattern -->
  </div>

  <!-- M3 Design System Web Components -->
  <script type="module" src="https://cdn.jsdelivr.net/gh/wyyew/m3-design-v2@main/dist/web-components.js"></script>
</body>
</html>
