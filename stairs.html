<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Residential Stair Calculator (IRC)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
        }

        .controls {
            flex: 1;
            min-width: 250px;
        }

        .visuals {
            flex: 2;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            margin-top: 0;
            color: #2c3e50;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .results {
            background: #eef2f5;
            padding: 15px;
            border-radius: 8px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 16px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 5px;
        }

        .result-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .highlight {
            font-weight: bold;
            color: #2980b9;
        }

        canvas {
            background: #fafafa;
            border: 1px solid #eee;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="controls">
            <h2>Stair Calculator V1</h2>
            <label for="heightInput">Floor-to-Floor Height (inches):</label>
            <input type="number" id="heightInput" value="108" min="40" max="200" step="1">

            <div class="results">
                <div class="result-item"><span>Total Risers:</span> <span id="outRisers" class="highlight">-</span>
                </div>
                <div class="result-item"><span>Riser Height:</span> <span id="outRiserHeight" class="highlight">-</span>
                </div>
                <div class="result-item"><span>Total Treads:</span> <span id="outTreads" class="highlight">-</span>
                </div>
                <div class="result-item"><span>Total Run:</span> <span id="outRun" class="highlight">-</span></div>
            </div>
            <p style="font-size: 12px; color: #7f8c8d; margin-top: 15px;">*Calculations based on IRC maximum riser
                (7.75") and minimum tread (10").</p>
        </div>

        <div class="visuals">
            <canvas id="stairCanvas" width="500" height="400"></canvas>
        </div>
    </div>

    <script>
        const heightInput = document.getElementById('heightInput');
        const outRisers = document.getElementById('outRisers');
        const outRiserHeight = document.getElementById('outRiserHeight');
        const outTreads = document.getElementById('outTreads');
        const outRun = document.getElementById('outRun');
        const canvas = document.getElementById('stairCanvas');
        const ctx = canvas.getContext('2d');

        function calculateAndDraw() {
            const height = parseFloat(heightInput.value);
            if (!height || height <= 0) return;

            // IRC Math
            const totalRisers = Math.ceil(height / 7.75);
            const exactRiserHeight = height / totalRisers;
            const totalTreads = totalRisers - 1;
            const totalRun = totalTreads * 10;

            // Update Text Outputs
            outRisers.innerText = totalRisers;
            outRiserHeight.innerText = exactRiserHeight.toFixed(2) + '"';
            outTreads.innerText = totalTreads;
            outRun.innerText = totalRun.toFixed(1) + '"';

            // Draw Canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const padding = 40;
            const drawWidth = canvas.width - (padding * 2);
            const drawHeight = canvas.height - (padding * 2);

            // Scaling to fit canvas
            const scaleX = drawWidth / totalRun;
            const scaleY = drawHeight / height;
            // Keep proportions realistic if possible, or just fit to box
            const scale = Math.min(scaleX, scaleY);

            const startX = padding;
            const startY = canvas.height - padding;

            ctx.beginPath();
            ctx.moveTo(startX, startY); // Start at bottom floor

            let currentX = startX;
            let currentY = startY;

            // Draw Steps
            for (let i = 0; i < totalRisers; i++) {
                // Draw Riser (up)
                currentY -= exactRiserHeight * scale;
                ctx.lineTo(currentX, currentY);

                // Draw Tread (right), except for the very last step which meets the upper floor
                if (i < totalTreads) {
                    currentX += 10 * scale;
                    ctx.lineTo(currentX, currentY);
                }
            }

            ctx.strokeStyle = '#2c3e50';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Draw Floors
            ctx.beginPath();
            ctx.moveTo(startX - 20, startY);
            ctx.lineTo(startX + 20, startY);
            ctx.moveTo(currentX - 20, currentY);
            ctx.lineTo(currentX + 40, currentY);
            ctx.strokeStyle = '#7f8c8d';
            ctx.lineWidth = 4;
            ctx.stroke();
        }

        // Event Listeners
        heightInput.addEventListener('input', calculateAndDraw);

        // Initial load
        calculateAndDraw();
    </script>

</body>

</html>
